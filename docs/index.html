<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trend Radar — หอควบคุมกระแส</title>
<style>
  /* ─── โทเค็นดีไซน์: ธีมจอเรดาร์กลางคืน ─── */
  :root {
    --bg:        #0a0e14;   /* พื้นจอเข้ม */
    --bg-panel:  #111824;   /* การ์ด */
    --bg-panel2: #0d131d;
    --grid:      #1b2735;   /* เส้นกริดเรดาร์ */
    --ink:       #e6edf3;   /* ตัวอักษรหลัก */
    --ink-dim:   #7d8da1;   /* ตัวอักษรรอง */
    --growth:    #2bff88;   /* พุ่ง — เขียวนีออน */
    --peak:      #ffc23d;   /* พีค — เหลืองอำพัน */
    --decline:   #ff4d5e;   /* ดับ — แดง */
    --intro:     #4db5ff;   /* เกิด — ฟ้า */
    --stable:    #5a6b80;   /* นิ่ง — เทา */
    --accent:    #2bff88;
    --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', ui-monospace, monospace;
    --sans: 'Inter', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
    min-height: 100vh;
    /* กริดจางๆ เลียนแบบจอเรดาร์ */
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 44px 44px;
    background-position: center;
  }
  body::before {
    /* แสงเรืองมุมบน */
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(43,255,136,0.08), transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 28px 20px 80px; }

  /* ─── Header ─── */
  header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 8px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .radar-dot {
    width: 38px; height: 38px; border-radius: 50%;
    border: 2px solid var(--accent);
    position: relative; flex-shrink: 0;
    box-shadow: 0 0 16px rgba(43,255,136,0.4);
  }
  .radar-dot::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(43,255,136,0.5) 60deg, transparent 70deg);
    animation: sweep 3s linear infinite;
  }
  @keyframes sweep { to { transform: rotate(360deg); } }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  h1 span { color: var(--accent); }
  .tagline { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  .meta { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); text-align: right; }
  .meta .live { color: var(--accent); }
  .meta .live::before { content: '●'; margin-right: 5px; animation: blink 1.6s ease-in-out infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* ─── แถบสรุป ─── */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 12px; margin: 24px 0 28px; }
  .stat { background: var(--bg-panel); border: 1px solid var(--grid); border-radius: 10px; padding: 14px 16px; }
  .stat .num { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; }
  .stat .lbl { font-size: 11px; color: var(--ink-dim); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat.g .num { color: var(--growth); } .stat.p .num { color: var(--peak); }
  .stat.d .num { color: var(--decline); } .stat.i .num { color: var(--intro); }

  /* ─── ตัวกรอง ─── */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .chip {
    font-family: var(--mono); font-size: 12px; padding: 7px 14px; border-radius: 20px;
    background: var(--bg-panel); border: 1px solid var(--grid); color: var(--ink-dim);
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .chip:hover { border-color: var(--ink-dim); color: var(--ink); }
  .chip.on { background: var(--accent); color: #04210f; border-color: var(--accent); font-weight: 600; }

  /* ─── การ์ดคีย์เวิร์ด ─── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px,1fr)); gap: 14px; }
  .card {
    background: linear-gradient(160deg, var(--bg-panel), var(--bg-panel2));
    border: 1px solid var(--grid); border-radius: 12px; padding: 18px;
    position: relative; overflow: hidden; transition: transform 0.15s, border-color 0.15s;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--phase); }
  .card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--phase);
  }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .kw { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
  .phase-tag {
    font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 6px;
    white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px;
    background: color-mix(in srgb, var(--phase) 16%, transparent); color: var(--phase);
    border: 1px solid color-mix(in srgb, var(--phase) 35%, transparent);
  }

  /* แถบ score */
  .score-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .score-row .big { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--phase); line-height: 1; }
  .score-row .of { font-family: var(--mono); font-size: 13px; color: var(--ink-dim); }
  .score-bar { height: 5px; background: var(--grid); border-radius: 3px; overflow: hidden; margin: 10px 0 16px; }
  .score-bar i { display: block; height: 100%; background: var(--phase); border-radius: 3px; transition: width 0.6s ease; }

  /* metrics v/a */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .metric { background: rgba(255,255,255,0.02); border: 1px solid var(--grid); border-radius: 8px; padding: 9px 11px; }
  .metric .ml { font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .metric .mv { font-family: var(--mono); font-size: 16px; font-weight: 600; margin-top: 2px; }
  .metric .mv.pos { color: var(--growth); } .metric .mv.neg { color: var(--decline); }

  /* สินค้าแนะนำ */
  .product { border-top: 1px dashed var(--grid); padding-top: 12px; }
  .product .mood { font-size: 12px; color: var(--ink-dim); margin-bottom: 6px; }
  .product .sell { font-size: 13px; color: var(--ink); }
  .product .sell b { color: var(--peak); font-weight: 600; }

  /* การ์ด CTA สำหรับเฟสพุ่ง */
  .card.is-act { box-shadow: 0 0 0 1px var(--phase), 0 0 24px color-mix(in srgb, var(--phase) 20%, transparent); }
  .act-banner {
    font-family: var(--mono); font-size: 10px; font-weight: 700; color: #04210f; background: var(--phase);
    text-align: center; padding: 5px; border-radius: 6px; margin-bottom: 12px; letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ─── สถานะโหลด/ว่าง ─── */
  .state { text-align: center; padding: 80px 20px; color: var(--ink-dim); font-family: var(--mono); }
  .state .ic { font-size: 38px; margin-bottom: 14px; opacity: 0.6; }
  .state code { background: var(--bg-panel); padding: 2px 7px; border-radius: 5px; color: var(--accent); }

  footer { margin-top: 50px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--ink-dim); line-height: 1.8; }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 540px) {
    h1 { font-size: 19px; }
    .score-row .big { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="radar-dot"></div>
      <div>
        <h1>Trend <span>Radar</span></h1>
        <div class="tagline">หอควบคุมกระแส · meme lifecycle monitor</div>
      </div>
    </div>
    <div class="meta">
      <div class="live">LIVE</div>
      <div id="updated">กำลังโหลด…</div>
    </div>
  </header>

  <div class="summary" id="summary"></div>
  <div class="filters" id="filters"></div>
  <div id="content"><div class="state"><div class="ic">📡</div>กำลังสแกนสัญญาณ…</div></div>

  <footer>
    อัปเดตอัตโนมัติทุก 3 ชั่วโมงจาก GitHub Actions<br>
    ข้อมูลจาก Google Trends · ประมวลผลด้วย velocity / acceleration engine
  </footer>
</div>

<script>
// ─── นิยามเฟส ───
const PHASES = {
  GROWTH:  { color: 'var(--growth)',  label: 'พุ่ง',  emoji: '🚀', desc: 'จังหวะทอง — รีบทำคลิป' },
  PEAK:    { color: 'var(--peak)',    label: 'พีค',   emoji: '🔥', desc: 'ใกล้อิ่ม — ทำได้แต่รีบ' },
  DECLINE: { color: 'var(--decline)', label: 'ดับ',   emoji: '📉', desc: 'คนเบื่อแล้ว — ข้าม' },
  INTRO:   { color: 'var(--intro)',   label: 'เกิด',  emoji: '🌱', desc: 'เพิ่งโผล่ — จับตา' },
  STABLE:  { color: 'var(--stable)',  label: 'นิ่ง',  emoji: '➖', desc: 'ไม่มีกระแส' },
};
const ACT_PHASES = ['GROWTH', 'PEAK'];

let allData = [];
let activeFilter = 'ALL';

// ─── โหลดข้อมูลจาก latest.json ───
async function load() {
  try {
    const res = await fetch('latest.json?t=' + Date.now());
    if (!res.ok) throw new Error('no file');
    const json = await res.json();
    allData = json.results || [];
    render(json.run_timestamp);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="state"><div class="ic">🛰️</div>ยังไม่มีข้อมูล<br><br>' +
      'รอให้ระบบรันรอบแรก หรือสั่ง <code>gh workflow run "TikTok Trend Radar"</code><br>' +
      'แล้ว <code>git pull</code> ให้ไฟล์ data/latest.json มาอยู่ใน repo</div>';
    document.getElementById('updated').textContent = 'ไม่พบข้อมูล';
  }
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
}

function render(ts) {
  document.getElementById('updated').textContent = 'อัปเดต: ' + fmtTime(ts);

  // นับแต่ละเฟส
  const counts = { GROWTH:0, PEAK:0, DECLINE:0, INTRO:0, STABLE:0 };
  allData.forEach(d => { if (counts[d.label] !== undefined) counts[d.label]++; });

  // แถบสรุป
  document.getElementById('summary').innerHTML = `
    <div class="stat g"><div class="num">${counts.GROWTH}</div><div class="lbl">🚀 พุ่ง</div></div>
    <div class="stat p"><div class="num">${counts.PEAK}</div><div class="lbl">🔥 พีค</div></div>
    <div class="stat i"><div class="num">${counts.INTRO}</div><div class="lbl">🌱 เกิด</div></div>
    <div class="stat d"><div class="num">${counts.DECLINE}</div><div class="lbl">📉 ดับ</div></div>
    <div class="stat"><div class="num">${allData.length}</div><div class="lbl">รวมทั้งหมด</div></div>
  `;

  // ตัวกรอง
  const filterDefs = [['ALL','ทั้งหมด'],['GROWTH','🚀 พุ่ง'],['PEAK','🔥 พีค'],['INTRO','🌱 เกิด'],['DECLINE','📉 ดับ'],['STABLE','➖ นิ่ง']];
  document.getElementById('filters').innerHTML = filterDefs.map(([k,v]) =>
    `<div class="chip ${k===activeFilter?'on':''}" data-f="${k}">${v}</div>`
  ).join('');
  document.querySelectorAll('.chip').forEach(c => c.onclick = () => {
    activeFilter = c.dataset.f; render(ts);
  });

  renderCards();
}

function renderCards() {
  // เรียงตาม momentum สูง->ต่ำ, กรองตามเฟสที่เลือก
  let list = [...allData].sort((a,b) => b.momentum_score - a.momentum_score);
  if (activeFilter !== 'ALL') list = list.filter(d => d.label === activeFilter);

  if (!list.length) {
    document.getElementById('content').innerHTML =
      '<div class="state"><div class="ic">🔍</div>ไม่มีคีย์เวิร์ดในเฟสนี้</div>';
    return;
  }

  document.getElementById('content').innerHTML = '<div class="grid">' + list.map(card).join('') + '</div>';
  // เล่นอนิเมชันแถบ score
  requestAnimationFrame(() => {
    document.querySelectorAll('.score-bar i').forEach(el => { el.style.width = el.dataset.w + '%'; });
  });
}

function card(d) {
  const ph = PHASES[d.label] || PHASES.STABLE;
  const isAct = ACT_PHASES.includes(d.label);
  const vClass = d.avg_velocity > 0 ? 'pos' : (d.avg_velocity < 0 ? 'neg' : '');
  const aClass = d.avg_acceleration > 0 ? 'pos' : (d.avg_acceleration < 0 ? 'neg' : '');
  const prod = d.product_suggestion;

  return `
  <div class="card ${isAct?'is-act':''}" style="--phase:${ph.color}">
    ${isAct ? `<div class="act-banner">${ph.emoji} ${ph.desc}</div>` : ''}
    <div class="card-top">
      <div class="kw">${esc(d.keyword)}</div>
      <div class="phase-tag">${ph.emoji} ${ph.label}</div>
    </div>
    <div class="score-row">
      <span class="big">${Math.round(d.current_score)}</span>
      <span class="of">/ 100 score</span>
    </div>
    <div class="score-bar"><i data-w="${Math.min(100, Math.max(2, d.current_score))}"></i></div>
    <div class="metrics">
      <div class="metric"><div class="ml">Velocity</div><div class="mv ${vClass}">${fmtNum(d.avg_velocity)}</div></div>
      <div class="metric"><div class="ml">Acceleration</div><div class="mv ${aClass}">${fmtNum(d.avg_acceleration)}</div></div>
    </div>
    ${prod ? `
    <div class="product">
      <div class="mood">🛒 ${esc(prod.mood_display || '')}</div>
      <div class="sell">ขายคู่กับ: <b>${esc((prod.products && prod.products[0]) || '—')}</b></div>
    </div>` : ''}
  </div>`;
}

function fmtNum(n) { const v = Number(n); return (v>0?'+':'') + v.toFixed(2); }
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

load();
setInterval(load, 5 * 60 * 1000); // รีเฟรชทุก 5 นาที
</script>
</body>
</html>
