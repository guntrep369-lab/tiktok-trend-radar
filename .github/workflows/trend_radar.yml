name: TikTok Trend Radar
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  run-trend-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run trend radar pipeline
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python scripts/run_radar.py --mode live
      - name: Commit and push updated data
        run: |
          git config user.name "trend-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "data update ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --no-edit --rebase
            git push
          fi

  deploy-dashboard:
    needs: run-trend-radar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
