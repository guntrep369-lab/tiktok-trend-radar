name: AI Video Factory

# สั่งเองเท่านั้น (workflow_dispatch) — ไม่ผูกกับ cron 3 ชม. เพราะ Veo มีค่าใช้จ่ายต่อคลิป
# ถ้าอยากให้รันอัตโนมัติรายวัน ค่อยเพิ่ม schedule เองทีหลัง (แนะนำไม่เกิน 1-3 คลิป/วัน)
on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "คีย์เวิร์ด/สินค้า (เช่น อาหารเปียกแมว)"
        required: true
      upload:
        description: "อัปโหลดขึ้น YouTube (private) เลยไหม"
        type: boolean
        default: true

jobs:
  make-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install ffmpeg + Thai fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-thai-tlwg
      - name: Install dependencies
        run: pip install -r requirements-video.txt
      - name: Generate AI video (Veo + Thai TTS)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/video_generator.py --keyword "${{ inputs.keyword }}" --out out/video.mp4
      - name: Upload to YouTube (private)
        if: ${{ inputs.upload }}
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/youtube_uploader.py upload --file out/video.mp4 --privacy private
      - name: Save video as artifact (สำรอง — โหลดไปโพสต์ TikTok ได้ด้วย)
        uses: actions/upload-artifact@v4
        with:
          name: ai-video-${{ github.run_number }}
          path: |
            out/video.mp4
            out/video.json
          retention-days: 7
